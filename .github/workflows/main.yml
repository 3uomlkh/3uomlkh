name: Readme Update

on:
  workflow_dispatch:    # 수동 실행 버튼 추가

  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  # 매주 월요일 오전 9시(한국시간)
  schedule:
    - cron: "0 0 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm install rss-parser

      - name: Update README
        run: npm start

      - name: Check for changes
        id: verify_diff
        run: |
          git add README.md
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit README
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "3uomlkh@gmail.com"
          git config --local user.name "3uomlkh"
          git add .
          git commit -m "Update README.md"
          git push origin main
